<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Ficha D&D</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 20px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button onclick="novo()">Novo Personagem</button>
    <button onclick="importar()">Importar Personagem</button>

    <script>
        function novo() {
            window.api.novoPersonagem();
        }

        function importar() {
            window.api.importarPersonagem();
        }
    </script>

</body>
</html>
