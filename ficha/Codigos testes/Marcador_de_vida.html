<html>
<head>
    <title>Marcador de Vida</title>
    <style>
.hp-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
}

/* ORBE */
.hp-orbe {
    position: relative;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 4px solid #5a2c0a;
    background: radial-gradient(circle at 30% 30%, #5c1a1a, #2a0b0b);
    overflow: hidden;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.7),
                0 0 10px rgba(0,0,0,0.4);
}

/* PREENCHIMENTO DINÂMICO */
.hp-fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(to top, #ff2e2e, #ff7a7a);
    transition: height 0.3s ease;
}

/* TEXTO CENTRAL */
.hp-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    align-items: center;
    gap: 4px;
    font-weight: bold;
    color: white;
    text-shadow: 0 0 6px black;
}

.hp-text input {
    width: 40px;
    border: none;
    background: none;
    text-align: center;
    font-size: 20px;
    color: white;
    font-weight: bold;
}

/* PV TEMP */
.hp-extra {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
}

.hp-extra input {
    width: 50px;
    text-align: center;
}
</head>
<body>
<div class="hp-container">
    <div class="hp-orbe">
        <div class="hp-fill" id="hpFill"></div>

        <div class="hp-text">
            <input type="number" id="hpAtual" value="38">
            <span>/</span>
            <input type="number" id="hpMax" value="44">
        </div>
    </div>

    <div class="hp-extra">
        <label>Temp</label>
        <input type="number" id="hpTemp" value="0">
    </div>
</div>
</body>
    <script>
    function atualizarHP() {
    const atual = parseInt(document.getElementById("hpAtual").value) || 0;
    const max = parseInt(document.getElementById("hpMax").value) || 1;

    const porcentagem = Math.max(0, Math.min(100, (atual / max) * 100));

    document.getElementById("hpFill").style.height = porcentagem + "%";
}

// Atualiza automaticamente
document.getElementById("hpAtual").addEventListener("input", atualizarHP);
document.getElementById("hpMax").addEventListener("input", atualizarHP);

// Inicial
atualizarHP();

    </script>
</html>
