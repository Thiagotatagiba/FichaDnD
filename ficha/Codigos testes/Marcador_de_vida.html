<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Vida Clássica (Refinado)</title>

<style>
body {
    background: #e7e1d5;
    font-family: 'Georgia', serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.hp-box {
    width: 300px; /* AUMENTADO */
    border: 3px solid #8b4513;
    border-radius: 14px;
    background: linear-gradient(#f4efe6, #efe6d6);
    padding: 12px;
    box-shadow: 0 6px 14px rgba(0,0,0,0.3);
}

.hp-current {
    display: grid;
    grid-template-columns: 0.85fr 1.15fr;
    border: 3px solid #2b2b2b;
    border-radius: 12px;
    background: white;
    overflow: hidden; /* VOLTA PRO CORRETO */
}

.hp-ribbons {
    display: flex;
    flex-direction: column;
}

.ribbon {
    flex: 1;
    padding: 8px 6px; /* MAIS RESPIRO */
    background: linear-gradient(#f3e8d8, #e7d7bf);
    border-right: 2px solid #8b4513;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.ribbon span {
    font-size: 10px;
    font-weight: bold;
    color: #6f3610;
}

.ribbon input {
    width: 100%;
    border: none;
    text-align: center;
    font-weight: bold;
    background: transparent;
    font-size: 18px; /* MAIS LEGÍVEL */
}

.hp-main {
    display: flex;
    flex-direction: column;
    align-items: stretch; /* IMPORTANTE */
    justify-content: center;
    padding: 10px 10px 14px; /* ESPAÇO EMBAIXO PROS CORAÇÕES */
    gap: 6px;
}

.hp-main input {
    font-size: 36px;
    border: none;
    text-align: center; /* IGUAL FICHA D&D */
    font-weight: bold;
    margin: 0;
    width: 100%; /* EVITA BARRA BRANCA */
    background: transparent;
    box-sizing: border-box;
}

.hearts {
    display: flex;
    align-items: center;
    justify-content: flex-start; /* ALINHA COM O NÚMERO */
    gap: 6px;
    width: 100%;
}

.heart {
    width: 18px;
    height: 18px;
    display: flex;
}

.heart svg {
    width: 100%;
    height: 100%;
    display: block;
}

.bg {
    fill: #e0e0e0;
}

.fill-red {
    fill: url(#gradRed);
    clip-path: inset(0 100% 0 0);
    transition: clip-path 0.2s ease;
}

.fill-blue {
    fill: url(#gradBlue);
    clip-path: inset(0 100% 0 0);
    transition: clip-path 0.2s ease;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="hp-box">

    <div class="hp-current">

        <div class="hp-ribbons">
            <div class="ribbon">
                <span>MAX</span>
                <input type="number" id="hpMax" value="44">
            </div>
            <div class="ribbon">
                <span>TEMP</span>
                <input type="number" id="hpTemp" value="0">
            </div>
        </div>

        <div class="hp-main">
            <input type="number" id="hpAtual" value="38">

            <div class="hearts" id="hearts">

                <svg width="0" height="0">
                    <defs>
                        <linearGradient id="gradRed" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#ff5a5a"/>
                            <stop offset="100%" stop-color="#8b0000"/>
                        </linearGradient>
                        <linearGradient id="gradBlue" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#5ab0ff"/>
                            <stop offset="100%" stop-color="#003f8b"/>
                        </linearGradient>
                    </defs>
                </svg>

                <div class="heart"><svg viewBox="0 0 24 24"><path class="bg" d="M12 21s-7-4.35-10-9a6 6 0 0 1 10-6 6 6 0 0 1 10 6c-3 4.65-10 9-10 9z"/><path class="fill-red" d="M12 21s-7-4.35-10-9a6 6 0 0 1 10-6 6 6 0 0 1 10 6c-3 4.65-10 9-10 9z"/></svg></div>
                <div class="heart"><svg viewBox="0 0 24 24"><path class="bg" d="M12 21s-7-4.35-10-9a6 6 0 0 1 10-6 6 6 0 0 1 10 6c-3 4.65-10 9-10 9z"/><path class="fill-red" d="M12 21s-7-4.35-10-9a6 6 0 0 1 10-6 6 6 0 0 1 10 6c-3 4.65-10 9-10 9z"/></svg></div>
                <div class="heart"><svg viewBox="0 0 24 24"><path class="bg" d="M12 21s-7-4.35-10-9a6 6 0 0 1 10-6 6 6 0 0 1 10 6c-3 4.65-10 9-10 9z"/><path class="fill-red" d="M12 21s-7-4.35-10-9a6 6 0 0 1 10-6 6 6 0 0 1 10 6c-3 4.65-10 9-10 9z"/></svg></div>
                <div class="heart"><svg viewBox="0 0 24 24"><path class="bg" d="M12 21s-7-4.35-10-9a6 6 0 0 1 10-6 6 6 0 0 1 10 6c-3 4.65-10 9-10 9z"/><path class="fill-red" d="M12 21s-7-4.35-10-9a6 6 0 0 1 10-6 6 6 0 0 1 10 6c-3 4.65-10 9-10 9z"/></svg></div>
                <div class="heart"><svg viewBox="0 0 24 24"><path class="bg" d="M12 21s-7-4.35-10-9a6 6 0 0 1 10-6 6 6 0 0 1 10 6c-3 4.65-10 9-10 9z"/><path class="fill-red" d="M12 21s-7-4.35-10-9a6 6 0 0 1 10-6 6 6 0 0 1 10 6c-3 4.65-10 9-10 9z"/></svg></div>

                <div class="heart hidden" id="tempHeart">
                    <svg viewBox="0 0 24 24">
                        <path class="bg" d="M12 21s-7-4.35-10-9a6 6 0 0 1 10-6 6 6 0 0 1 10 6c-3 4.65-10 9-10 9z"/>
                        <path class="fill-blue" d="M12 21s-7-4.35-10-9a6 6 0 0 1 10-6 6 6 0 0 1 10 6c-3 4.65-10 9-10 9z"/>
                    </svg>
                </div>

            </div>
        </div>

    </div>

</div>

<script>
function atualizarCoracoes() {
    const atual = parseFloat(hpAtual.value) || 0;
    const max = parseFloat(hpMax.value) || 1;
    const temp = parseFloat(hpTemp.value) || 0;

    // Vida base (limitada ao max)
    const vidaBase = Math.min(atual, max);
    const ratioBase = Math.max(0, Math.min(1, vidaBase / max));

    // ❤️ Corações vermelhos
    const hearts = document.querySelectorAll('.fill-red');
    hearts.forEach((fill, i) => {
        let valor = ratioBase * 5 - i;
        valor = Math.max(0, Math.min(1, valor));
        fill.style.clipPath = `inset(0 ${100 - valor * 100}% 0 0)`;
    });

    // 💙 TEMP (consumido primeiro)
    const tempHeart = document.getElementById('tempHeart');

    if (temp > 0) {
        tempHeart.classList.remove('hidden');

        // quanto do temp ainda existe acima do max
        const tempRestante = Math.max(0, atual - max);

        const tempRatio = Math.max(0, Math.min(1, tempRestante / max));

        tempHeart.querySelector('.fill-blue').style.clipPath = `inset(0 ${100 - tempRatio * 100}% 0 0)`;
    } else {
        tempHeart.classList.add('hidden');
    }
}

['hpAtual','hpMax','hpTemp'].forEach(id => {
    document.getElementById(id).addEventListener('input', atualizarCoracoes);
});

// Testes básicos
console.assert(typeof atualizarCoracoes === 'function', 'Função não definida');

atualizarCoracoes();
</script>

</body>
</html>
