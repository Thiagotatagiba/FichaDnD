<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Ficha D&D</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 20px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="novoPersonagemBtn" type="button">Novo Personagem</button>
    <button id="importarPersonagemBtn" type="button">Importar Personagem</button>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const novoButton = document.getElementById('novoPersonagemBtn');
            const importarButton = document.getElementById('importarPersonagemBtn');
            const api = window.api;

            if (!api) {
                [novoButton, importarButton].forEach(button => {
                    if (button) button.disabled = true;
                });
                return;
            }

            novoButton?.addEventListener('click', () => {
                api.novoPersonagem();
            });

            importarButton?.addEventListener('click', () => {
                api.importarPersonagem();
            });
        });
    </script>

</body>
</html>
