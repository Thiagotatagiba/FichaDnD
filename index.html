<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ficha D&D - Início</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Metamorphous&family=MedievalSharp&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --marrom-escuro: #5f2d0c;
      --marrom: #8b4513;
      --marrom-claro: #a0522d;
      --dourado: #c9a06a;
      --pergaminho: #f6f2ea;
      --pergaminho-escuro: #efe7da;
      --fundo: #e7e1d5;
    }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: "MedievalSharp", cursive;
      color: #3f2712;
      background:
        radial-gradient(circle at 20% 20%, rgba(139, 69, 19, 0.10), transparent 45%),
        radial-gradient(circle at 80% 0%, rgba(139, 69, 19, 0.12), transparent 40%),
        radial-gradient(circle at 50% 100%, rgba(139, 69, 19, 0.10), transparent 45%),
        var(--fundo);
      overflow-x: hidden;
    }

    /* ===== Decoração de fundo (brasão sutil) ===== */
    .fundo-decorativo {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .fundo-decorativo svg {
      width: 100%;
      height: 100%;
    }

    /* ===== Cartão principal ===== */
    .card-inicial {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      background: var(--pergaminho);
      border: 4px solid var(--marrom);
      border-radius: 16px;
      padding: 36px 32px 30px;
      text-align: center;
      box-shadow:
        0 18px 45px rgba(45, 27, 10, 0.28),
        inset 0 0 0 1px rgba(139, 69, 19, 0.25);
    }

    .card-inicial::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(139, 69, 19, 0.35);
      border-radius: 10px;
      pointer-events: none;
    }

    .brasao {
      width: 78px;
      height: 78px;
      margin: 0 auto 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: linear-gradient(180deg, #f3e6cc 0%, #e2c99a 100%);
      border: 3px solid var(--marrom);
      box-shadow: 0 6px 14px rgba(45, 27, 10, 0.25);
      font-size: 38px;
    }

    h1 {
      font-family: "Metamorphous", serif;
      font-size: 34px;
      margin: 6px 0 2px;
      color: var(--marrom-escuro);
      letter-spacing: 0.02em;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);
    }

    .subtitulo {
      margin: 0 0 22px;
      font-size: 15px;
      color: #6f4b24;
      letter-spacing: 0.04em;
    }

    .divisor {
      width: 120px;
      height: 3px;
      margin: 0 auto 26px;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        var(--marrom) 20%,
        var(--dourado) 50%,
        var(--marrom) 80%,
        transparent 100%
      );
    }

    /* ===== Botões ===== */
    .acoes-iniciais {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 4px;
    }

    .botao-principal,
    .botao-secundario {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 20px;
      font-family: "MedievalSharp", cursive;
      font-size: 17px;
      font-weight: bold;
      letter-spacing: 0.02em;
      border-radius: 10px;
      cursor: pointer;
      transition:
        transform 0.15s ease,
        box-shadow 0.15s ease,
        background 0.2s ease;
    }

    .botao-principal {
      border: 2px solid var(--marrom-escuro);
      background: linear-gradient(180deg, var(--marrom-claro), var(--marrom-escuro));
      color: #fff8ef;
      box-shadow: 0 8px 18px rgba(74, 36, 10, 0.32);
    }

    .botao-principal:hover,
    .botao-principal:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 12px 22px rgba(74, 36, 10, 0.4);
      background: linear-gradient(180deg, #b1603a, #6f3610);
      outline: none;
    }

    .botao-secundario {
      border: 2px solid var(--marrom);
      background: var(--pergaminho-escuro);
      color: var(--marrom-escuro);
      box-shadow: 0 4px 10px rgba(139, 69, 19, 0.12);
    }

    .botao-secundario:hover,
    .botao-secundario:focus-visible {
      transform: translateY(-2px);
      background: #e5d2ab;
      box-shadow: 0 8px 16px rgba(139, 69, 19, 0.2);
      outline: none;
    }

    .botao-icone {
      font-size: 20px;
      line-height: 1;
    }

    .dica-importar {
      margin-top: 14px;
      font-size: 12px;
      color: #8a755d;
      font-style: italic;
    }

    #inputImportarArquivo {
      display: none;
    }

    /* ===== Feedback de importação ===== */
    .status-importacao {
      margin-top: 16px;
      min-height: 20px;
      font-size: 13px;
      font-weight: bold;
      transition: opacity 0.2s ease;
    }

    .status-importacao.sucesso {
      color: #1f6f3e;
    }

    .status-importacao.erro {
      color: #a11d1d;
    }

    .status-importacao.carregando {
      color: #6f4b24;
    }

    .divisor-apoio {
      margin-top: 22px;
      margin-bottom: 18px;
      width: 90px;
    }

    .botao-apoio {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      font-family: "MedievalSharp", cursive;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.02em;
      color: var(--marrom-escuro);
      background: transparent;
      border: 2px solid rgba(139, 69, 19, 0.45);
      border-radius: 999px;
      text-decoration: none;
      cursor: pointer;
      transition:
        transform 0.15s ease,
        background 0.2s ease,
        border-color 0.2s ease,
        box-shadow 0.2s ease;
    }

    .botao-apoio:hover,
    .botao-apoio:focus-visible {
      transform: translateY(-2px);
      background: rgba(201, 160, 106, 0.22);
      border-color: var(--marrom);
      box-shadow: 0 8px 16px rgba(139, 69, 19, 0.18);
      outline: none;
    }

    .botao-apoio .botao-icone {
      font-size: 16px;
    }

    /* ===== Rodapé ===== */
    .rodape-inicial {
      position: relative;
      z-index: 1;
      margin-top: 26px;
      text-align: center;
      font-size: 12px;
      color: #6f4b24;
      opacity: 0.85;
    }

    .rodape-inicial strong {
      color: var(--marrom-escuro);
    }

    @media (max-width: 480px) {
      .card-inicial {
        padding: 28px 20px 24px;
      }

      h1 {
        font-size: 27px;
      }

      .botao-principal,
      .botao-secundario {
        font-size: 15px;
        padding: 14px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="fundo-decorativo" aria-hidden="true">
    <svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
      <polygon
        points="50,4 92,26 92,74 50,96 8,74 8,26"
        fill="none"
        stroke="#8b4513"
        stroke-width="0.3"
      />
    </svg>
  </div>

  <main class="card-inicial">
    <div class="brasao" aria-hidden="true">🐉</div>
    <h1>Ficha D&amp;D</h1>
    <p class="subtitulo">Sua aventura começa aqui</p>
    <div class="divisor"></div>

    <div class="acoes-iniciais">
      <button type="button" class="botao-principal" id="btnImportarPersonagem">
        <span class="botao-icone">📤</span>
        Importar Personagem
      </button>

      <button type="button" class="botao-secundario" id="btnNovaFicha">
        <span class="botao-icone">📜</span>
        Abrir Nova Ficha
      </button>
    </div>

    <p class="dica-importar">
      Selecione o arquivo .json exportado pela sua ficha para continuar de onde parou.
    </p>

    <div id="statusImportacao" class="status-importacao" role="status" aria-live="polite"></div>

    <input type="file" id="inputImportarArquivo" accept=".json,application/json" />

    <div class="divisor divisor-apoio"></div>

    <a
      class="botao-apoio"
      href="https://sites.google.com/view/tatagibarpg/doa%C3%A7%C3%A3o"
      target="_blank"
      rel="noopener noreferrer"
    >
      <span class="botao-icone">💰</span>
      Ajude o Projeto
    </a>
  </main>

  <footer class="rodape-inicial">
    <p>Criado por: <strong>Thiago Tatagiba</strong></p>
  </footer>

  <script>
    const CAMINHO_FICHA = "ficha/Ficha_DnD_-_Tatagiba_1.0.html";
    const CHAVE_IMPORTACAO_PENDENTE = "fichaImportarPendente";

    function abrirFicha() {
      window.location.href = CAMINHO_FICHA;
    }

    function definirStatusImportacao(mensagem, tipo) {
      const status = document.getElementById("statusImportacao");
      if (!status) return;
      status.textContent = mensagem || "";
      status.className = "status-importacao" + (tipo ? " " + tipo : "");
    }

    document
      .getElementById("btnNovaFicha")
      ?.addEventListener("click", abrirFicha);

    document
      .getElementById("btnImportarPersonagem")
      ?.addEventListener("click", () => {
        document.getElementById("inputImportarArquivo")?.click();
      });

    document
      .getElementById("inputImportarArquivo")
      ?.addEventListener("change", function (evento) {
        const arquivo = evento.target.files && evento.target.files[0];
        if (!arquivo) return;

        definirStatusImportacao("Lendo personagem...", "carregando");

        const leitor = new FileReader();

        leitor.onload = function (e) {
          try {
            const texto = e.target.result;
            // valida que é um JSON legível antes de guardar
            JSON.parse(texto);

            localStorage.setItem(CHAVE_IMPORTACAO_PENDENTE, texto);
            definirStatusImportacao(
              "Personagem carregado! Abrindo ficha...",
              "sucesso",
            );

            setTimeout(abrirFicha, 500);
          } catch (erro) {
            console.error("Erro ao importar personagem:", erro);
            definirStatusImportacao(
              "Arquivo inválido. Selecione um .json exportado pela ficha.",
              "erro",
            );
          } finally {
            evento.target.value = "";
          }
        };

        leitor.onerror = function () {
          definirStatusImportacao("Erro ao ler o arquivo.", "erro");
          evento.target.value = "";
        };

        leitor.readAsText(arquivo, "utf-8");
      });
  </script>
</body>
</html>
