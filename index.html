<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Ficha D&D - Início</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #e7e1d5;
            font-family: Arial, sans-serif;
            gap: 20px;
        }

        button {
            padding: 20px 40px;
            font-size: 20px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #8b4513;
            color: white;
        }

        button:hover {
            background: #a0522d;
        }
    </style>
</head>
<body>

    <button id="novoPersonagemBtn" type="button">Novo Personagem</button>
    <button id="importarPersonagemBtn" type="button">Importar Personagem</button>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const novoButton = document.getElementById('novoPersonagemBtn');
            const importarButton = document.getElementById('importarPersonagemBtn');
            const api = window.api;

            novoButton?.addEventListener('click', () => {
                if (api?.novoPersonagem) {
                    api.novoPersonagem();
                } else {
                    alert("Novo personagem clicado (modo navegador)");
                }
            });

            importarButton?.addEventListener('click', () => {
                if (api?.importarPersonagem) {
                    api.importarPersonagem();
                } else {
                    alert("Importar personagem clicado (modo navegador)");
                }
            });
        });
    </script>

</body>
</html>
