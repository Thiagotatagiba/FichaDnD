<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modal Ataque DnD - Réplica Completa da Ficha</title>
    <link
      href="https://fonts.googleapis.com/css2?family=MedievalSharp:wght@400;700&family=Metamorphous&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ===== CSS 100% EXTRAÍDO DA FICHA ORIGINAL ===== */
      :root {
        --modal-bg: linear-gradient(180deg, #fff9ef 0%, #f6ead2 100%);
        --modal-border: 2px solid #8b4513;
        --modal-radius: 16px;
        --modal-shadow: 0 24px 60px rgba(33, 19, 10, 0.32);
        --modal-overlay-bg: rgba(33, 19, 10, 0.55);
        --modal-header-border: 1px solid rgba(139, 69, 19, 0.25);
        --modal-button-bg: #fffaf2;
        --modal-button-hover: #f3e3c5;
        --modal-text: #3f2712;
        --modal-title: #6f3610;
        --modal-subtitle: #8b5a2b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: "MedievalSharp", cursive;
        background: linear-gradient(135deg, #e7e1d5 0%, #d4c8b0 100%);
        min-height: 100vh;
        margin: 0;
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
      }

      .demo-container {
        background: #f6f2ea;
        border: 4px solid #8b4513;
        border-radius: 20px;
        padding: 30px;
        max-width: 500px;
        width: 100%;
        box-shadow: 0 20px 40px rgba(139, 69, 19, 0.3);
      }

      .demo-title {
        text-align: center;
        font-size: 28px;
        color: #6f3610;
        margin-bottom: 20px;
        font-weight: bold;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        font-family: "Metamorphous", serif;
      }

      .demo-character {
        background: linear-gradient(145deg, #fffaf2, #f0e6d2);
        border: 3px solid #bda68c;
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 25px;
        text-align: center;
      }

      .demo-character h3 {
        margin: 0 0 10px;
        color: #8b4513;
        font-size: 20px;
      }
      .demo-character-stats {
        font-size: 16px;
        color: #5c3a1a;
      }
      .demo-weapon {
        font-size: 18px;
        font-weight: bold;
        color: #6f3610;
        margin-top: 10px;
      }

      .demo-buttons {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 25px;
      }

      .demo-btn {
        background: linear-gradient(145deg, #d4c5ae, #b8a78e);
        border: 2px solid #8b4513;
        border-radius: 12px;
        color: #5f2d0c;
        font-family: "MedievalSharp", cursive;
        font-size: 16px;
        font-weight: bold;
        padding: 12px 24px;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 12px rgba(139, 69, 19, 0.3);
      }

      .demo-btn:hover {
        background: linear-gradient(145deg, #e5d6c0, #d0c0a8);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(139, 69, 19, 0.4);
      }
      .demo-btn:active {
        transform: translateY(0);
      }

      /* MODAL CSS EXATO DA FICHA */
      .modal-overlay-base {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: var(--modal-overlay-bg);
        z-index: 2000;
      }

      .modal-base {
        max-width: 100%;
        max-height: min(82vh, 980px);
        overflow: auto;
        border: var(--modal-border);
        border-radius: var(--modal-radius);
        background: var(--modal-bg);
        box-shadow: var(--modal-shadow);
        color: var(--modal-text);
        box-sizing: border-box;
      }

      .ataque-modal-overlay {
        z-index: 2001;
      }
      .ataque-modal-overlay.ativo {
        display: flex;
      }

      .ataque-modal {
        width: min(420px, 100%);
        border: var(--modal-border);
        border-radius: var(--modal-radius);
        background: var(--modal-bg);
        box-shadow: var(--modal-shadow);
        padding: 0;
        overflow: hidden;
      }

      .ataque-modal-topo {
        display: flex;
        justify-content: flex-start;
        align-items: center;
        min-height: 40px;
        padding: 10px 16px;
        background: linear-gradient(180deg, #e7d7bf, #dcc5a0);
        border-bottom: 1px solid #bda68c;
        font-family: "MedievalSharp", cursive;
      }

      .ataque-modal-rodada {
        font-size: 12px;
        color: #6f3610;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .ataque-modal-rodada strong {
        font-family: "Metamorphous", serif;
        font-size: 15px;
        margin-left: 4px;
      }

      .ataque-modal-corpo {
        padding: 18px;
      }

      .ataque-modal-titulo {
        font-family: "Metamorphous", serif;
        font-size: 18px;
        color: #6f3610;
        margin-bottom: 6px;
        text-align: center;
      }
      .ataque-modal-titulo-arma {
        font-weight: bold;
      }

      .ataque-modal-subtitulo {
        font-size: 13px;
        color: #5c4832;
        margin-bottom: 14px;
        text-align: center;
        line-height: 1.45;
      }

      .ataque-modal-linha {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 14px;
      }
      .ataque-modal-linha label {
        font-size: 11px;
        color: #6f3610;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .ataque-modal-linha label.oculto-acessivel {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .ataque-modal-rolagem {
        display: grid;
        grid-template-columns: minmax(0, auto) auto;
        gap: 10px;
        align-items: center;
        justify-content: center;
      }

      .ataque-modal-campo {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .ataque-modal-campo-com-dado {
        gap: 8px;
      }

      .ataque-modal-campo-rotulo {
        position: absolute;
        top: 6px;
        left: 48px;
        font-size: 9px;
        line-height: 1;
        color: #8b5a2b;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        pointer-events: none;
        z-index: 1;
      }

      .ataque-modal input {
        width: 100%;
        min-height: 38px;
        border: 2px solid #bda68c;
        border-radius: 10px;
        background: #fffaf2;
        padding: 8px 10px;
        box-sizing: border-box;
        font-family: "Metamorphous", serif;
        font-size: 22px;
        text-align: center;
      }

      #modalAtaqueDado,
      #modalAtaqueDano {
        width: 84px;
        min-width: 84px;
        padding-top: 16px;
        padding-left: 8px;
        padding-right: 8px;
      }
      .ataque-modal input:focus {
        outline: none;
        border-color: #8b5a2b;
        box-shadow: 0 0 0 3px rgba(139, 90, 43, 0.12);
      }

      .ataque-modal-bonus {
        font-family: "Metamorphous", serif;
        font-size: 15px;
        color: #3b2f1b;
        white-space: nowrap;
      }

      .ataque-modal-total {
        margin-top: 6px;
        font-size: 12px;
        color: #5c4832;
        text-align: center;
        min-height: 16px;
      }
      .ataque-modal-total strong {
        font-family: "Metamorphous", serif;
        color: #6f3610;
        margin-left: 4px;
      }

      .ataque-modal-resultados-dano {
        margin-top: 4px;
        font-family: "Courier New", monospace;
        font-size: 12px;
        color: #6f3610;
        text-align: center;
        min-height: 16px;
      }

      .ataque-modal-resumo {
        text-align: left;
        margin-bottom: 14px;
        font-size: 18px;
        color: #5c4832;
        line-height: 1.4;
        font-family: "Metamorphous", serif;
      }
      .ataque-modal-resumo-destaque {
        font-weight: bold;
        color: #6f3610;
        font-size: 18px;
        font-family: "Metamorphous", serif;
      }
      .ataque-modal-resumo-dado-critico {
        color: #b8860b;
        text-shadow: 0 0 8px rgba(255, 215, 0, 0.65);
      }

      .calc-item {
        display: inline-flex;
        align-items: center;
        gap: 1px;
        font-weight: bold;
        line-height: 1;
        vertical-align: middle;
        font-size: 16px;
        font-family: "Metamorphous", serif;
      }
      .calc-item .numero {
        font-size: 22px;
        display: inline-block;
      }
      .calc-item .emoji {
        font-size: 12px;
        line-height: 1;
      }
      .ataque-modal-resumo-total {
        font-size: 22px;
      }

      .ataque-modal-checklist {
        display: flex;
        justify-content: center;
        gap: 14px;
        margin: 12px 0 14px;
        flex-wrap: wrap;
      }
      .ataque-modal-checkitem {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #5c4832;
        cursor: pointer;
        user-select: none;
      }
      .ataque-modal-checkitem input {
        width: 16px;
        min-height: 16px;
        height: 16px;
        margin: 0;
        accent-color: #8b4513;
      }

      .ataque-modal-acoes {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .ataque-modal-acoes .ataque-botao {
        flex: 1 1 120px;
        min-width: 120px;
      }

      .ataque-botao {
        border: 2px solid #8b4513;
        border-radius: 8px;
        background: #d4c5ae;
        color: #5f2d0c;
        font-family: "MedievalSharp", cursive;
        font-size: 14px;
        font-weight: bold;
        padding: 10px 16px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .ataque-botao:hover {
        background: #e0d2b8;
        transform: translateY(-1px);
      }

      .ataque-botao-critico {
        background: linear-gradient(135deg, #f8efb8, #ffe57a);
        border-color: #b8860b;
        box-shadow: 0 0 12px rgba(255, 215, 0, 0.75);
        animation: ataqueCriticoBrilho 1.1s ease-in-out infinite;
      }

      .ataque-botao-fracasso-critico {
        background: linear-gradient(135deg, #6e1717, #c43b2f);
        border-color: #4a0d0d;
        color: #fff7f2;
        box-shadow: 0 0 12px rgba(196, 59, 47, 0.7);
        animation: ataqueFracassoBrilho 1.1s ease-in-out infinite;
      }

      @keyframes ataqueCriticoBrilho {
        0%,
        100% {
          box-shadow: 0 0 8px rgba(255, 215, 0, 0.45);
          transform: translateY(0);
        }
        50% {
          box-shadow: 0 0 18px rgba(255, 215, 0, 0.95);
          transform: translateY(-1px);
        }
      }

      @keyframes ataqueFracassoBrilho {
        0%,
        100% {
          box-shadow: 0 0 8px rgba(196, 59, 47, 0.35);
          transform: translateY(0);
        }
        50% {
          box-shadow: 0 0 18px rgba(196, 59, 47, 0.95);
          transform: translateY(-1px);
        }
      }

      .ataque-modal-historico {
        margin-top: 14px;
        padding-top: 10px;
        border-top: 1px solid rgba(139, 69, 19, 0.22);
        font-family: "Courier New", monospace;
        font-size: 11px;
        color: #6b5a46;
        line-height: 1.4;
      }

      .ataque-modal-historico-rotulo {
        color: #6f3610;
        margin-right: 6px;
      }
      .ataque-modal-historico-lista {
        word-break: break-word;
      }

      .oculto {
        display: none !important;
      }

      .botao-dado {
        width: 32px;
        height: 32px;
        flex: 0 0 32px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #8b4513;
        border-radius: 10px;
        background: #fffaf2;
        color: #6f3610;
        font-size: 18px;
        line-height: 1;
        cursor: pointer;
        padding: 0;
        box-shadow: 0 0 0 2px rgba(139, 69, 19, 0.08);
        transition: all 0.15s ease;
      }

      .botao-dado:hover {
        background: #f3e3c5;
        border-color: #6f3610;
      }
      .botao-dado:active {
        transform: scale(0.9);
      }
      .botao-dado.rolando .botao-dado-icone {
        animation: girar 0.5s linear infinite;
      }

      @keyframes girar {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 480px) {
        .demo-container {
          padding: 20px;
          margin: 0 10px;
        }
        .demo-buttons {
          flex-direction: column;
        }
        .demo-btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="demo-container">
      <div class="demo-title">🗡️ Modal Ataque - Réplica COMPLETA da Ficha</div>

      <div class="demo-character">
        <h3>Thrain Martelferro</h3>
        <div class="demo-character-stats">
          Guerreiro 6 | FOR +4 | CA Inimigo: 20
        </div>
        <div class="demo-weapon">⚔️ Espada Longa (1d8/1d10 Cortante)</div>
      </div>

      <div class="demo-buttons">
        <button class="demo-btn" onclick="abrirModalAtaque()">
          🎲 Abrir Modal Ataque (Espada Longa)
        </button>
        <button class="demo-btn" onclick="resetDemo()">🔄 Reset Demo</button>
      </div>
    </div>

    <!-- HTML EXATO DA FICHA -->
    <div
      id="modalAtaqueOverlay"
      class="ataque-modal-overlay modal-overlay-base oculto"
      aria-hidden="true"
    >
      <div
        class="ataque-modal modal-base"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modalAtaqueTitulo"
      >
        <div class="ataque-modal-topo">
          <div id="modalAtaqueRodada" class="ataque-modal-rodada">
            Rodada <strong id="modalAtaqueRodadaNum">1</strong>
          </div>
        </div>
        <div class="ataque-modal-corpo">
          <!-- RESUMO/ETAPA ATAQUE -->
          <div id="modalAtaqueEtapaDado">
            <div id="modalAtaqueTitulo" class="ataque-modal-titulo">
              Ataque com
              <span id="modalAtaqueArmaNome" class="ataque-modal-titulo-arma"
                >arma</span
              >
            </div>
            <div id="modalAtaqueSubtitulo" class="ataque-modal-subtitulo">
              Digite o dado tirado.
            </div>

            <div class="ataque-modal-linha">
              <label for="modalAtaqueDado" class="oculto-acessivel">Dado</label>
              <div class="ataque-modal-rolagem">
                <div class="ataque-modal-campo ataque-modal-campo-com-dado">
                  <span class="ataque-modal-campo-rotulo">Dado</span>
                  <button
                    type="button"
                    id="modalAtaqueRolarDado"
                    class="botao-dado"
                    title="Rolar 1d20"
                  >
                    <span class="botao-dado-icone">🎲</span>
                  </button>
                  <input
                    id="modalAtaqueDado"
                    type="number"
                    min="1"
                    max="20"
                    step="1"
                  />
                </div>
                <div id="modalAtaqueBonus" class="ataque-modal-bonus">
                  + 0 (FOR)
                </div>
              </div>
              <div id="modalAtaqueTotal" class="ataque-modal-total">
                Total <strong>-</strong>
              </div>
            </div>

            <!-- CHECKLIST TIPO AÇÃO -->
            <div class="ataque-modal-checklist">
              <label class="ataque-modal-checkitem">
                <input
                  id="modalAtaqueAcao"
                  type="checkbox"
                  data-tipo-acao="Ação"
                  checked
                />AÇÃO
              </label>
              <label class="ataque-modal-checkitem">
                <input
                  id="modalAtaqueAcaoBonus"
                  type="checkbox"
                  data-tipo-acao="Ação bônus"
                />AÇÃO BONUS
              </label>
              <label class="ataque-modal-checkitem">
                <input
                  id="modalAtaqueReacao"
                  type="checkbox"
                  data-tipo-acao="Reação"
                />REAÇÃO
              </label>
            </div>

            <div class="ataque-modal-acoes">
              <button
                type="button"
                class="ataque-botao"
                id="modalAtaqueSucesso"
              >
                ✅ Sucesso
              </button>
              <button
                type="button"
                class="ataque-botao"
                id="modalAtaqueFracasso"
              >
                ❌ Fracasso
              </button>
              <button
                type="button"
                class="ataque-botao"
                id="modalAtaqueCancelar"
              >
                Cancelar ataque
              </button>
            </div>

            <div class="ataque-modal-historico">
              <span class="ataque-modal-historico-rotulo">Histórico:</span>
              <span
                id="modalAtaqueHistoricoLista"
                class="ataque-modal-historico-lista"
                >-</span
              >
            </div>
          </div>

          <!-- RESUMO/ETAPA DANO -->
          <div id="modalAtaqueEtapaDano" class="oculto">
            <div id="modalAtaqueResumo" class="ataque-modal-resumo"></div>
            <div class="ataque-modal-linha">
              <label for="modalAtaqueDano" class="oculto-acessivel"
                >Dado de Dano</label
              >
              <div class="ataque-modal-rolagem">
                <div class="ataque-modal-campo ataque-modal-campo-com-dado">
                  <span class="ataque-modal-campo-rotulo">Dado</span>
                  <div
                    style="
                      display: flex;
                      flex-direction: column;
                      align-items: center;
                    "
                  >
                    <button
                      type="button"
                      id="modalAtaqueRolarDano"
                      class="botao-dado"
                      title="Rolar dano"
                    >
                      <span class="botao-dado-icone">🎲</span>
                    </button>
                    <div
                      id="modalAtaqueResultadosDano"
                      class="ataque-modal-resultados-dano"
                    ></div>
                  </div>
                  <input id="modalAtaqueDano" type="number" min="1" step="1" />
                </div>
                <div id="modalAtaqueBonusDano" class="ataque-modal-bonus">
                  + 0 (FOR)
                </div>
              </div>
              <div id="modalAtaqueTotalDano" class="ataque-modal-total">
                Total <strong>-</strong>
              </div>
            </div>

            <div class="ataque-modal-acoes">
              <button
                type="button"
                class="ataque-botao"
                id="modalAtaqueRegistrarDano"
              >
                📝 Registrar dano
              </button>
              <button
                type="button"
                class="ataque-botao"
                id="modalAtaqueCancelarDano"
              >
                Cancelar ataque
              </button>
            </div>

            <div class="ataque-modal-historico">
              <span class="ataque-modal-historico-rotulo">Histórico:</span>
              <span
                id="modalAtaqueHistoricoDano"
                class="ataque-modal-historico-lista"
                >-</span
              >
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      /* ===== JS DOS DADOS - LÓGICA EXATA DA FICHA ===== */
      let estado = {
        armaAtual: null,
        rodadaAtual: 1,
        historicoAtaque: [],
        historicoDano: [],
        isCritico: false,
        isFracassoCritico: false,
      };

      window.abrirModalAtaque = function (
        nomeArma = "Espada Longa",
        danoNormal = "1d8",
        danoVersatil = "1d10",
        tipoDano = "Cortante",
        mod = 4,
        caInimigo = 20,
      ) {
        console.log("🎯 Modal aberto:", { nomeArma, mod, caInimigo });
        estado.armaAtual = {
          nome: nomeArma,
          danoNormal,
          danoVersatil,
          tipo: tipoDano,
          mod,
          caInimigo,
        };
        estado.rodadaAtual = 1;
        estado.historicoAtaque = [];
        estado.historicoDano = [];

        // TÍTULOS/RESUMOS EXATOS
        document.getElementById("modalAtaqueArmaNome").textContent = nomeArma;
        document.getElementById("modalAtaqueRodadaNum").textContent =
          estado.rodadaAtual;
        document.getElementById("modalAtaqueBonus").textContent = "+ 4💪";
        document.getElementById("modalAtaqueBonusDano").textContent = "+ 4💪";

        resetInputs();
        mostrarEtapa("dado");
        document
          .getElementById("modalAtaqueOverlay")
          .classList.remove("oculto");
        document.getElementById("modalAtaqueOverlay").classList.add("ativo");
      };

      function resetDemo() {
        resetInputs();
        document.getElementById("modalAtaqueOverlay").classList.add("oculto");
      }

      function resetInputs() {
        ["modalAtaqueDado", "modalAtaqueDano"].forEach((id) => {
          document.getElementById(id).value = "";
        });
        document.getElementById("modalAtaqueTotal").innerHTML =
          "Total <strong>-</strong>";
        document.getElementById("modalAtaqueTotalDano").innerHTML =
          "Total <strong>-</strong>";
        document
          .querySelectorAll(".ataque-modal-checkitem input")
          .forEach((cb) => (cb.checked = false));
        document.getElementById("modalAtaqueAcao").checked = true;
        document.getElementById("modalAtaqueHistoricoLista").textContent = "-";
        document.getElementById("modalAtaqueHistoricoDano").textContent = "-";
        document.getElementById("modalAtaqueResumo").innerHTML = "";
      }

      function mostrarEtapa(etapa) {
        document
          .getElementById("modalAtaqueEtapaDado")
          .classList.toggle("oculto", etapa !== "dado");
        document
          .getElementById("modalAtaqueEtapaDano")
          .classList.toggle("oculto", etapa !== "dano");
      }

      document.getElementById("modalAtaqueRolarDado").onclick = () => {
        const btn = event.target.closest(".botao-dado");
        btn.classList.add("rolando");
        setTimeout(() => {
          const dado = Math.floor(Math.random() * 20) + 1;
          document.getElementById("modalAtaqueDado").value = dado;
          calcularTotalAtaque();
          btn.classList.remove("rolando");
        }, 500);
      };

      document.getElementById("modalAtaqueRolarDano").onclick = () => {
        const btn = event.target.closest(".botao-dado");
        btn.classList.add("rolando");
        const faces = estado.armaAtual.danoNormal.includes("d10") ? 10 : 8;
        const dado = Math.floor(Math.random() * faces) + 1;
        document.getElementById("modalAtaqueResultadosDano").textContent = dado;
        document.getElementById("modalAtaqueDano").value = dado;
        calcularTotalDano();
        btn.classList.remove("rolando");
      };

      function calcularTotalAtaque() {
        const dado =
          parseInt(document.getElementById("modalAtaqueDado").value) || 0;
        const bonus = estado.armaAtual?.mod || 0;
        const total = dado + bonus;
        const ca = estado.armaAtual?.caInimigo || 20;
        document.getElementById("modalAtaqueTotal").innerHTML =
          `Total <strong>${total}</strong> vs CA ${ca}${total >= ca ? " ✅" : " ❌"}`;
      }

      function calcularTotalDano() {
        const dado =
          parseInt(document.getElementById("modalAtaqueDano").value) || 0;
        const bonus = estado.armaAtual?.mod || 0;
        const total = dado + bonus;
        document.getElementById("modalAtaqueTotalDano").innerHTML =
          `Total <strong>${total}</strong>`;
      }

      // EVENTOS DOS BOTÕES (JS DA FICHA)
      document.getElementById("modalAtaqueSucesso").onclick = () => {
        const dado =
          parseInt(document.getElementById("modalAtaqueDado").value) || 0;
        const tipo =
          Array.from(
            document.querySelectorAll(".ataque-modal-checkitem input:checked"),
          )
            .map((cb) => cb.dataset.tipoAcao)
            .join(" / ") || "Ação";
        estado.historicoAtaque.push(
          `${tipo}: ${dado}+${estado.armaAtual.mod}=${dado + estado.armaAtual.mod} ✅`,
        );
        document.getElementById("modalAtaqueHistoricoLista").textContent =
          estado.historicoAtaque.slice(-3).join(" | ");
        event.target.classList.add("ataque-botao-critico");
        setTimeout(
          () => event.target.classList.remove("ataque-botao-critico"),
          1500,
        );
        mostrarEtapa("dano");
        const tooltipAtributo = "FOR";
        const iconeAtributo = "💪";
        const bonusProf = 2; // Bônus proficiência
        const tooltipDano = "Modificador de dano (FOR)";
        const totalAtaque = dado + estado.armaAtual.mod;
        const isCritico = dado === 20;
        document.getElementById("modalAtaqueResumo").innerHTML =
          `Ataque: <span class="ataque-modal-resumo-destaque">${totalAtaque}</span> ( <span class="ataque-modal-resumo-destaque${isCritico ? " ataque-modal-resumo-dado-critico" : ""}"><span class="calc-item" title="Valor do dado"><span class="numero">${dado}</span><span class="emoji">🎲</span></span></span> + <span class="ataque-modal-resumo-destaque"><span class="calc-item" title="FOR"><span class="numero">${estado.armaAtual.mod}</span><span class="emoji">💪</span></span></span> + <span class="ataque-modal-resumo-destaque"><span class="calc-item" title="Bônus de Proficiência"><span class="numero">2</span><span class="emoji">🅿️</span></span></span>)<br><br>Dano da arma: <span class="ataque-modal-resumo-destaque">${estado.armaAtual.danoNormal} + <span class="calc-item" title="Modificador de dano (FOR)"><span class="numero">${estado.armaAtual.mod}</span><span class="emoji">💪</span></span> ${estado.armaAtual.tipo}</span>`;
      };

      document.getElementById("modalAtaqueFracasso").onclick = () => {
        const dado =
          parseInt(document.getElementById("modalAtaqueDado").value) || 0;
        const tipo =
          Array.from(
            document.querySelectorAll(".ataque-modal-checkitem input:checked"),
          )
            .map((cb) => cb.dataset.tipoAcao)
            .join(" / ") || "Ação";
        estado.historicoAtaque.push(
          `${tipo}: ${dado}+${estado.armaAtual.mod}=${dado + estado.armaAtual.mod} ❌`,
        );
        document.getElementById("modalAtaqueHistoricoLista").textContent =
          estado.historicoAtaque.slice(-3).join(" | ");
        event.target.classList.add("ataque-botao-fracasso-critico");
        setTimeout(
          () => event.target.classList.remove("ataque-botao-fracasso-critico"),
          1500,
        );
        fecharModal();
      };

      document.getElementById("modalAtaqueCancelar").onclick = fecharModal;
      document.getElementById("modalAtaqueCancelarDano").onclick = fecharModal;

      document.getElementById("modalAtaqueRegistrarDano").onclick = () => {
        const dado =
          parseInt(document.getElementById("modalAtaqueDano").value) || 0;
        estado.historicoDano.push(
          `${estado.armaAtual.danoNormal}+${estado.armaAtual.mod}=${dado + estado.armaAtual.mod} ${estado.armaAtual.tipo}`,
        );
        document.getElementById("modalAtaqueHistoricoDano").textContent =
          estado.historicoDano.slice(-3).join(" | ");
        console.log(
          "🎯 Dano:",
          dado + estado.armaAtual.mod,
          estado.armaAtual.tipo,
        );
        fecharModal();
      };

      document.getElementById("modalAtaqueDado").oninput = calcularTotalAtaque;
      document.getElementById("modalAtaqueDano").oninput = calcularTotalDano;

      function fecharModal() {
        document.getElementById("modalAtaqueOverlay").classList.remove("ativo");
        setTimeout(
          () =>
            document
              .getElementById("modalAtaqueOverlay")
              .classList.add("oculto"),
          300,
        );
        resetDemo();
      }

      window.abrirModalAtaque = abrirModalAtaque;
      window.resetDemo = resetDemo;
      console.log("✅ Réplica completa da ficha carregada!");
    </script>
  </body>
</html>
